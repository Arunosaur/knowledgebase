<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowledgebase</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="/" class="logo">📚 Knowledgebase</a>
      <div class="search-bar">
        <input
          type="search"
          id="search-input"
          placeholder="Search articles…"
          aria-label="Search articles"
          autocomplete="off"
        />
      </div>
      <button id="new-article-btn" class="btn btn-primary">+ New Article</button>
    </div>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <section class="sidebar-section">
        <h3>Categories</h3>
        <ul id="category-list" class="filter-list"></ul>
      </section>
      <section class="sidebar-section">
        <h3>Tags</h3>
        <div id="tag-list" class="tag-cloud"></div>
      </section>
    </aside>

    <!-- Main content -->
    <main class="main-content">
      <!-- Article list view -->
      <div id="article-list-view">
        <div id="list-header">
          <h2 id="list-title">All Articles</h2>
          <span id="article-count" class="article-count"></span>
        </div>
        <div id="article-cards" class="article-cards"></div>
        <p id="no-results" class="no-results hidden">No articles found.</p>
      </div>

      <!-- Article detail view -->
      <div id="article-detail-view" class="hidden">
        <div class="article-nav">
          <button id="back-btn" class="btn btn-secondary">← Back</button>
          <div class="article-actions">
            <button id="edit-btn" class="btn btn-secondary">✏️ Edit</button>
            <button id="delete-btn" class="btn btn-danger">🗑️ Delete</button>
          </div>
        </div>
        <article id="article-content" class="article-body"></article>
      </div>

      <!-- Article editor -->
      <div id="article-editor" class="hidden">
        <div class="editor-header">
          <h2 id="editor-title">New Article</h2>
          <button id="cancel-btn" class="btn btn-secondary">Cancel</button>
        </div>
        <form id="article-form" class="editor-form">
          <div class="form-row">
            <div class="form-group">
              <label for="field-title">Title *</label>
              <input type="text" id="field-title" placeholder="Article title" required />
            </div>
            <div class="form-group">
              <label for="field-slug">Slug *</label>
              <input type="text" id="field-slug" placeholder="my-article-slug" required pattern="[a-z0-9]+(?:-[a-z0-9]+)*" />
              <small>Lowercase letters, numbers, and hyphens only</small>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="field-category">Category</label>
              <input type="text" id="field-category" placeholder="General" list="category-datalist" />
              <datalist id="category-datalist"></datalist>
            </div>
            <div class="form-group">
              <label for="field-tags">Tags</label>
              <input type="text" id="field-tags" placeholder="tag1, tag2, tag3" />
              <small>Comma-separated tags</small>
            </div>
          </div>
          <div class="form-group form-group-full">
            <label for="field-body">Content (Markdown)</label>
            <textarea id="field-body" rows="20" placeholder="Write your article in Markdown…"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="save-btn">Save Article</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <!-- Delete confirmation modal -->
  <div id="delete-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-backdrop"></div>
    <div class="modal-box">
      <h3>Delete Article</h3>
      <p>Are you sure you want to delete <strong id="delete-article-title"></strong>? This cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirm-delete-btn" class="btn btn-danger">Delete</button>
        <button id="cancel-delete-btn" class="btn btn-secondary">Cancel</button>
      </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
